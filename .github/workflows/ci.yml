name: CI

on:
  push:
    branches: ["main", "staging", "feature/**", "hotfix/**"]
  pull_request:
    branches: ["main", "staging"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npx eslint .

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build
